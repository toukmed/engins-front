<div class="yt-sidenav" [class.collapsed]="!sideNavOpen()">
  <!-- Header / Branding -->
  <div class="yt-header" [class.collapsed]="!sideNavOpen()">
    <div class="yt-logo">
      <mat-icon class="yt-logo-icon">construction</mat-icon>
      <span class="yt-logo-text" [class.hidden]="!sideNavOpen()">Equipements Manager</span>
    </div>
  </div>

  <!-- Menu Items -->
  <nav class="yt-menu">
    @for (item of menuItems(); track $index) {
      <a class="yt-menu-item" 
         [class.expanded]="sideNavOpen()"
         [routerLink]="item.route"
         routerLinkActive="yt-active"
         #rla="routerLinkActive"
      >
        <div class="yt-menu-item-inner" [class.expanded]="sideNavOpen()">
          <mat-icon 
            [matBadge]="item.label === 'Demandes' ? demandsCount() : null"
            matBadgeSize="small"
            matBadgeColor="warn"
            [fontSet]="rla.isActive ? 'material-icons' : 'material-icons-outlined'"
            class="yt-menu-icon"
          >{{item.icon}}</mat-icon>
          <span class="yt-menu-label" [class.mini-label]="!sideNavOpen()">{{item.label}}</span>
        </div>
      </a>
    }
  </nav>
</div>
